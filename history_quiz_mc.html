<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AP US History – Trimester 2 Study Quiz</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0f0c29; }
    @keyframes fadeSlideIn {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse {
      0%,100% { opacity: 1; } 50% { opacity: 0.4; }
    }
    .choice-btn {
      width: 100%;
      background: rgba(255,255,255,0.05);
      border: 1.5px solid rgba(255,255,255,0.12);
      border-radius: 14px;
      padding: 16px 20px;
      cursor: pointer;
      text-align: left;
      color: #e0d8ff;
      font-size: clamp(13px, 2vw, 15px);
      font-family: Georgia, serif;
      line-height: 1.5;
      transition: background 0.15s, border-color 0.15s, transform 0.1s;
      display: flex;
      align-items: flex-start;
      gap: 12px;
    }
    .choice-btn:hover:not(:disabled) {
      background: rgba(255,255,255,0.1);
      border-color: rgba(255,255,255,0.28);
      transform: translateX(3px);
    }
    .choice-btn.correct {
      background: rgba(92,219,92,0.15) !important;
      border-color: #5cdb5c !important;
      color: #fff !important;
    }
    .choice-btn.wrong {
      background: rgba(224,92,92,0.15) !important;
      border-color: #e05c5c !important;
      color: #e05c5c !important;
    }
    .choice-btn.dimmed {
      opacity: 0.38;
    }
    .label-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 26px;
      height: 26px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: bold;
      flex-shrink: 0;
      margin-top: 1px;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useCallback } = React;

    const ALL_QUESTIONS = {
      "Civil War": [
        { q: "Who was Clara Barton?", a: "Known as the 'Angel of the Battlefield,' she was a nurse who provided medical care during the Civil War and later founded the American Red Cross." },
        { q: "What was the Anaconda Plan?", a: "The Union's strategy to defeat the Confederacy by blockading Southern ports, controlling the Mississippi River, and squeezing the South economically." },
        { q: "What were the key North advantages at the start of the Civil War?", a: "Larger population, more industry, railroads, and stronger naval power." },
        { q: "What was the significance of the Battle of Gettysburg?", a: "The turning point of the Civil War (July 1863) — the Union victory stopped Lee's invasion of the North and marked the beginning of Confederate decline." },
        { q: "Who was Abraham Lincoln?", a: "16th President who led the nation through the Civil War, issued the Emancipation Proclamation, and was assassinated in 1865." },
      ],
      "Reconstruction": [
        { q: "What was Reconstruction?", a: "The period (1865–1877) when the federal government attempted to rebuild the South and integrate formerly enslaved people into society." },
        { q: "Who was Andrew Johnson?", a: "Lincoln's VP who became president after his assassination. He opposed harsh Reconstruction measures and was the first president to be impeached by the House." },
        { q: "What did the Fourteenth Amendment do?", a: "Granted citizenship to all persons born or naturalized in the U.S. and guaranteed equal protection under the law." },
        { q: "What did the Fifteenth Amendment do?", a: "Prohibited denying the right to vote based on race, color, or previous condition of servitude — giving Black men the legal right to vote." },
        { q: "What was sharecropping?", a: "A system where formerly enslaved people farmed land owned by whites in exchange for a share of the crop, keeping many in a cycle of debt and poverty." },
        { q: "Who were the Exodusters?", a: "African Americans who migrated from the South to Kansas and other western states in the late 1870s seeking freedom and better economic opportunities." },
      ],
      "The West & Native Americans": [
        { q: "What was the Homestead Act (1862)?", a: "A law offering 160 acres of free land to settlers who agreed to farm it for at least five years, encouraging westward migration." },
        { q: "What was the Morrill Act?", a: "A law granting states federal land to establish agricultural and mechanical colleges (land-grant universities)." },
        { q: "What was the transcontinental railroad?", a: "Completed in 1869, it connected the East and West coasts, transforming commerce, settlement, and displacing Native Americans." },
        { q: "What was the Dawes Act (1887)?", a: "A law that broke up Native American tribal lands and gave individual families 160-acre plots to force assimilation, resulting in massive land loss." },
        { q: "What was the Massacre at Wounded Knee?", a: "In 1890, U.S. soldiers killed approximately 250–300 Lakota Sioux men, women, and children in South Dakota." },
        { q: "What was a key feature of traditional Native American Plains culture?", a: "Plains tribes were often nomadic, following buffalo herds, with strong oral traditions and tribal governance." },
      ],
      "Industrialization & Gilded Age": [
        { q: "What is vertical integration?", a: "A business strategy where a company controls all stages of production from raw materials to finished product." },
        { q: "What was the Credit Mobilier scandal?", a: "A corruption scheme where Union Pacific executives created a fake construction company, overcharged the government, and bribed congressmen." },
        { q: "What was Social Darwinism?", a: "The idea that 'survival of the fittest' applied to society — the wealthy were superior, used to oppose government regulation and aid to the poor." },
        { q: "What is collective bargaining?", a: "The process by which workers negotiate wages, hours, and conditions with employers as a group through a union." },
        { q: "What did the Sherman Antitrust Act (1890) do?", a: "The first federal law to restrict monopolies and trusts, making it illegal to restrain trade or commerce." },
        { q: "What did the Interstate Commerce Act (1887) do?", a: "Created the ICC to regulate railroad rates and practices — an early step in federal regulation of business." },
        { q: "What was the Triangle Shirtwaist Fire?", a: "A 1911 NYC garment factory fire that killed 146 workers due to locked exits and poor safety, galvanizing the labor movement." },
      ],
      "Immigration & Urban Life": [
        { q: "What was the Chinese Exclusion Act (1882)?", a: "The first major federal law to restrict immigration based on nationality/race — it barred Chinese laborers from entering the U.S." },
        { q: "What was the Gentlemen's Agreement?", a: "An informal 1907 agreement where Japan stopped issuing passports to laborers in exchange for the U.S. not passing a formal exclusion law." },
        { q: "What was Angel Island?", a: "An immigration station in San Francisco Bay where Asian immigrants were detained and often faced harsh interrogations." },
        { q: "What was a political machine?", a: "A powerful urban organization that controlled city government by providing services to immigrants in exchange for votes, often through corruption." },
        { q: "What was Tammany Hall?", a: "New York City's Democratic political machine, known for corruption under bosses like 'Boss' Tweed." },
        { q: "What is graft?", a: "The illegal use of political power for personal gain — taking bribes, kickbacks, or public funds." },
        { q: "What was a row house?", a: "Urban housing where identical homes share side walls in a continuous row — common in industrial cities." },
      ],
      "Progressive Era": [
        { q: "What was the Progressive Movement?", a: "A reform movement (1890s–1920s) seeking to address problems caused by industrialization, immigration, and corruption through government action." },
        { q: "Who were the Muckrakers?", a: "Investigative journalists who exposed corruption, unsafe conditions, and social injustice." },
        { q: "Who was Upton Sinclair?", a: "A muckraker whose novel The Jungle (1906) exposed horrific conditions in meatpacking plants, helping lead to food safety legislation." },
        { q: "What was the 'bully pulpit'?", a: "Theodore Roosevelt's term for using the presidency as a platform to promote his agenda and shape public opinion." },
        { q: "What was the Pure Food and Drug Act?", a: "A 1906 law banning the sale of mislabeled or contaminated food and drugs." },
        { q: "What was the Social Gospel movement?", a: "A Protestant reform movement that applied Christian ethics to social problems like poverty, inequality, and child labor." },
        { q: "What were settlement houses?", a: "Community centers in poor immigrant neighborhoods providing social services and education, like Jane Addams' Hull House." },
        { q: "What was the NAACP?", a: "The National Association for the Advancement of Colored People, founded in 1909 to fight racial discrimination and advance civil rights." },
        { q: "What was Plessy v. Ferguson (1896)?", a: "A Supreme Court ruling upholding racial segregation under the 'separate but equal' doctrine, backing Jim Crow laws." },
        { q: "What was Prohibition?", a: "The nationwide ban on alcohol (1920–1933) enacted by the 18th Amendment." },
        { q: "What was women's suffrage?", a: "The movement for women's right to vote, achieved nationally in 1920 with the 19th Amendment." },
        { q: "Who was Gifford Pinchot?", a: "Roosevelt's chief of the U.S. Forest Service and a leading conservationist who promoted managed use of natural resources." },
      ],
      "Imperialism & Spanish-American War": [
        { q: "What is imperialism?", a: "A policy of extending a nation's power through colonization, military force, or economic dominance over other nations." },
        { q: "What was the de Lome Letter?", a: "A letter by a Spanish diplomat criticizing President McKinley leaked to the press in 1898, inflaming American opinion against Spain." },
        { q: "What was the Spanish-American War (1898)?", a: "A brief war in which the U.S. defeated Spain, gaining Cuba, Puerto Rico, Guam, and the Philippines — marking America's rise as a world power." },
        { q: "Who was Jose Marti?", a: "A Cuban poet and revolutionary hero who fought for Cuban independence from Spain." },
        { q: "What was the Roosevelt Corollary?", a: "An extension of the Monroe Doctrine (1904) declaring the U.S. had the right to intervene in Latin American countries." },
        { q: "What was the Open Door Policy?", a: "A U.S. policy calling for equal trading rights for all nations in China and preserving Chinese territorial integrity." },
        { q: "What was the Boxer Rebellion?", a: "A 1900 Chinese uprising against foreign influence, suppressed by an international force including the U.S." },
      ],
      "World War I": [
        { q: "What does MAIN stand for in WWI causes?", a: "Militarism, Alliance systems, Imperialism, and Nationalism — the four main causes of World War I." },
        { q: "What was the immediate cause of WWI?", a: "The assassination of Archduke Franz Ferdinand of Austria-Hungary in Sarajevo (June 1914) by Gavrilo Princip." },
        { q: "Why did the U.S. enter WWI?", a: "Unrestricted German submarine warfare, the Zimmermann Telegram (Germany's secret proposal to Mexico), and economic ties to the Allies." },
        { q: "What new weapons defined WWI combat?", a: "Poison gas, machine guns, tanks, and submarines (U-boats) led to brutal trench warfare." },
        { q: "What was the Selective Service Act (1917)?", a: "A law creating a military draft to build up U.S. armed forces for WWI." },
        { q: "Who was Woodrow Wilson?", a: "28th President who led the U.S. into WWI, proposed the 14 Points peace plan, and championed the League of Nations." },
        { q: "What were Wilson's 14 Points?", a: "Wilson's post-WWI peace proposal calling for open diplomacy, freedom of the seas, self-determination, and a League of Nations." },
        { q: "Who was A. Mitchell Palmer?", a: "Wilson's Attorney General who led mass arrests of suspected communists and radicals during the post-WWI Red Scare." },
      ],
      "The Roaring Twenties": [
        { q: "What defined the Roaring Twenties?", a: "Economic prosperity, cultural change, jazz music, consumerism, and social shifts — especially for women and African Americans." },
        { q: "Who were flappers?", a: "Young women who challenged traditional norms by cutting their hair, wearing shorter skirts, and asserting their independence." },
        { q: "What were speakeasies?", a: "Illegal bars that operated secretly during Prohibition, often protected by bribing police." },
        { q: "What was the Harlem Renaissance?", a: "A flourishing of African American art, music, and literature centered in Harlem, New York in the 1920s." },
        { q: "What was the Great Migration?", a: "The movement of over a million African Americans from the rural South to Northern cities seeking jobs and escape from Jim Crow laws." },
        { q: "What was the Scopes Trial?", a: "The 1925 trial of Tennessee teacher John T. Scopes for teaching evolution, highlighting the clash between modernism and religious fundamentalism." },
        { q: "What was the Double Standard in the 1920s?", a: "A social norm holding women to stricter moral standards than men." },
        { q: "What was the Teapot Dome Scandal?", a: "A bribery scandal under President Harding where the Secretary of the Interior secretly leased government oil reserves to private companies." },
        { q: "What was the KKK's role in the 1920s?", a: "The KKK experienced a massive revival targeting Black Americans, Catholics, Jews, and immigrants — reaching millions of members nationwide." },
        { q: "Who were Sacco and Vanzetti?", a: "Italian immigrant anarchists convicted and executed in 1927 for murder in a case widely seen as driven by anti-immigrant bias." },
        { q: "What drove consumerism in the 1920s?", a: "Mass production, installment buying/credit, advertising, and rising wages fueled by new products like radios and cars." },
      ],
      "Great Depression & New Deal": [
        { q: "What caused the Great Depression?", a: "Overproduction, stock speculation, bank failures, the Stock Market Crash of 1929, high tariffs, and weak banking regulation." },
        { q: "What was Black Tuesday?", a: "October 29, 1929 — the day the stock market crashed, wiping out billions in wealth and triggering the Great Depression." },
        { q: "What does 'buying stock on margin' mean?", a: "Purchasing stock by paying only a small percentage and borrowing the rest — when prices fell, investors couldn't repay loans." },
        { q: "What were Hoovervilles?", a: "Shantytowns of makeshift shelters built by homeless Americans during the Depression, sarcastically named after President Hoover." },
        { q: "What was the Dust Bowl?", a: "A severe drought and ecological disaster in the Great Plains (1930s) caused by over-farming, displacing hundreds of thousands of families." },
        { q: "How did Herbert Hoover respond to the Depression?", a: "He believed in voluntary action and limited government intervention, which proved inadequate and worsened the crisis." },
        { q: "Who was the Bonus Army?", a: "WWI veterans who marched on Washington in 1932 demanding early payment of promised bonuses, then forcibly removed by Hoover." },
        { q: "What was the New Deal?", a: "FDR's series of programs (1933–1939) designed to provide Relief, Recovery, and Reform during the Great Depression." },
        { q: "What was the bank holiday?", a: "FDR's act upon taking office in 1933 — closing all U.S. banks briefly to stop panic withdrawals and restore confidence." },
        { q: "What was the Works Progress Administration (WPA)?", a: "A New Deal agency that employed millions in public works projects building roads, bridges, schools, and supporting the arts." },
        { q: "What was the Agricultural Adjustment Act (AAA)?", a: "A New Deal program that paid farmers to reduce production to raise crop prices." },
        { q: "What was the Social Security Act (1935)?", a: "A landmark New Deal law creating a federal pension for the elderly, unemployment insurance, and aid to dependent families." },
        { q: "What was the New Deal Coalition?", a: "FDR's broad political alliance of labor unions, African Americans, urban immigrants, farmers, and Southern Democrats." },
      ],
    };

    const TOPIC_COLORS = {
      "Civil War": { bg: "#7C1D1D", accent: "#E05C5C" },
      "Reconstruction": { bg: "#7C4A1D", accent: "#E09A5C" },
      "The West & Native Americans": { bg: "#4A6B2A", accent: "#82B84A" },
      "Industrialization & Gilded Age": { bg: "#1D3D6B", accent: "#5C8FE0" },
      "Immigration & Urban Life": { bg: "#3D1D6B", accent: "#9B5CE0" },
      "Progressive Era": { bg: "#1D5C52", accent: "#3DB5A5" },
      "Imperialism & Spanish-American War": { bg: "#6B3D1D", accent: "#C07840" },
      "World War I": { bg: "#3D3D1D", accent: "#B0A040" },
      "The Roaring Twenties": { bg: "#1D1D5C", accent: "#6060C8" },
      "Great Depression & New Deal": { bg: "#2A2A2A", accent: "#888888" },
    };

    const CHOICE_LABELS = ["A", "B", "C", "D"];

    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    async function generateDistractors(question, correctAnswer, allAnswers) {
      const otherAnswers = allAnswers.filter(a => a !== correctAnswer);
      const sampleWrong = shuffle(otherAnswers).slice(0, 6).map(a => `- ${a}`).join("\n");

      const prompt = `You are helping create a multiple choice history quiz for AP US History students.

Question: "${question}"
Correct answer: "${correctAnswer}"

Here are some other answers from the quiz (you may reuse up to 2 of these as distractors if they are plausible wrong answers for THIS question, or write new ones):
${sampleWrong}

Generate exactly 3 plausible but clearly wrong answer choices for this question. Each distractor should:
- Be roughly the same length as the correct answer
- Sound historically plausible to a student who hasn't studied enough
- Be clearly incorrect to someone who knows the material
- NOT be vague or obviously silly

Respond ONLY with a JSON array of exactly 3 strings, no other text. Example format:
["distractor one", "distractor two", "distractor three"]`;

      const response = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 400,
          messages: [{ role: "user", content: prompt }]
        })
      });

      const data = await response.json();
      const text = data.content[0].text.trim();
      const cleaned = text.replace(/```json|```/g, "").trim();
      const parsed = JSON.parse(cleaned);
      return parsed;
    }

    function LoadingScreen({ progress, total }) {
      const pct = Math.round((progress / total) * 100);
      return (
        <div style={{ minHeight: "100vh", background: "linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%)", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", fontFamily: "Georgia, serif", padding: 24 }}>
          <div style={{ textAlign: "center", maxWidth: 400 }}>
            <div style={{ fontSize: 48, marginBottom: 20 }}>📚</div>
            <h2 style={{ color: "#fff", fontSize: 22, marginBottom: 8 }}>Generating Quiz...</h2>
            <p style={{ color: "#a89bda", fontSize: 14, marginBottom: 32 }}>Creating answer choices for your questions</p>
            <div style={{ background: "rgba(255,255,255,0.08)", borderRadius: 99, height: 8, marginBottom: 12 }}>
              <div style={{ background: "linear-gradient(90deg, #c9a227, #e8c547)", height: "100%", borderRadius: 99, width: pct + "%", transition: "width 0.4s ease" }} />
            </div>
            <p style={{ color: "#c9a227", fontSize: 13 }}>{progress} / {total} questions ready</p>
          </div>
        </div>
      );
    }

    function HistoryQuiz() {
      const [screen, setScreen] = useState("menu");
      const [selectedTopics, setSelectedTopics] = useState([]);
      const [questions, setQuestions] = useState([]);
      const [current, setCurrent] = useState(0);
      const [scores, setScores] = useState({});
      const [sessionResults, setSessionResults] = useState([]);
      const [selected, setSelected] = useState(null);
      const [isCorrect, setIsCorrect] = useState(null);
      const [loadingProgress, setLoadingProgress] = useState(0);
      const [loadingTotal, setLoadingTotal] = useState(0);
      const [animKey, setAnimKey] = useState(0);

      const topics = Object.keys(ALL_QUESTIONS);

      const toggleTopic = (t) => setSelectedTopics(prev => prev.includes(t) ? prev.filter(x => x !== t) : [...prev, t]);
      const selectAll = () => setSelectedTopics([...topics]);
      const clearAll = () => setSelectedTopics([]);

      const allAnswers = Object.values(ALL_QUESTIONS).flat().map(q => q.a);

      const startQuiz = async () => {
        const pool = shuffle(
          selectedTopics.flatMap(t => ALL_QUESTIONS[t].map(q => ({ ...q, topic: t })))
        );
        setLoadingTotal(pool.length);
        setLoadingProgress(0);
        setScreen("loading");

        const withChoices = [];
        for (let i = 0; i < pool.length; i++) {
          const item = pool[i];
          try {
            const distractors = await generateDistractors(item.q, item.a, allAnswers);
            const choices = shuffle([item.a, ...distractors]);
            withChoices.push({ ...item, choices, correctIndex: choices.indexOf(item.a) });
          } catch (e) {
            // fallback: use 3 random other answers as distractors
            const fallback = shuffle(allAnswers.filter(a => a !== item.a)).slice(0, 3);
            const choices = shuffle([item.a, ...fallback]);
            withChoices.push({ ...item, choices, correctIndex: choices.indexOf(item.a) });
          }
          setLoadingProgress(i + 1);
        }

        setQuestions(withChoices);
        setCurrent(0);
        setSelected(null);
        setIsCorrect(null);
        setSessionResults([]);
        setAnimKey(k => k + 1);
        setScreen("quiz");
      };

      const handleSelect = (idx) => {
        if (selected !== null) return;
        const q = questions[current];
        const correct = idx === q.correctIndex;
        setSelected(idx);
        setIsCorrect(correct);
        setScores(prev => ({
          ...prev,
          [q.topic]: {
            correct: (prev[q.topic] ? prev[q.topic].correct : 0) + (correct ? 1 : 0),
            total: (prev[q.topic] ? prev[q.topic].total : 0) + 1,
          }
        }));
        setSessionResults(prev => [...prev, { ...q, correct, selectedIdx: idx }]);
      };

      const nextQuestion = () => {
        if (current + 1 >= questions.length) {
          setScreen("results");
        } else {
          setCurrent(c => c + 1);
          setSelected(null);
          setIsCorrect(null);
          setAnimKey(k => k + 1);
        }
      };

      const currentQ = questions[current];
      const col = currentQ ? TOPIC_COLORS[currentQ.topic] : TOPIC_COLORS["Civil War"];
      const totalCorrect = sessionResults.filter(r => r.correct).length;

      // ---- LOADING ----
      if (screen === "loading") {
        return <LoadingScreen progress={loadingProgress} total={loadingTotal} />;
      }

      // ---- MENU ----
      if (screen === "menu") {
        return (
          <div style={{ minHeight: "100vh", background: "linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%)", fontFamily: "Georgia, serif", display: "flex", flexDirection: "column", alignItems: "center" }}>
            <div style={{ width: "100%", maxWidth: 780, padding: "40px 24px 60px" }}>

              <div style={{ textAlign: "center", marginBottom: 36 }}>
                <div style={{ fontSize: 13, letterSpacing: 4, textTransform: "uppercase", color: "#a89bda", marginBottom: 12 }}>AP US History · Trimester 2</div>
                <h1 style={{ fontSize: "clamp(28px, 6vw, 48px)", fontWeight: "bold", color: "#fff", margin: "0 0 8px", lineHeight: 1.1 }}>
                  Final Exam<br /><span style={{ color: "#c9a227" }}>Study Quiz</span>
                </h1>
                <p style={{ color: "#a89bda", margin: 0, fontSize: 15 }}>Multiple choice · Choose your topics</p>
              </div>

              {Object.keys(scores).length > 0 && (
                <div style={{ background: "rgba(201,162,39,0.12)", border: "1px solid rgba(201,162,39,0.3)", borderRadius: 12, padding: "14px 20px", marginBottom: 28, display: "flex", alignItems: "center", justifyContent: "space-between", flexWrap: "wrap", gap: 8 }}>
                  <span style={{ color: "#c9a227", fontSize: 14 }}>📊 Session Progress</span>
                  <div style={{ display: "flex", gap: 16, flexWrap: "wrap" }}>
                    {Object.entries(scores).map(([topic, s]) => (
                      <span key={topic} style={{ color: "#e0d8ff", fontSize: 12 }}>
                        <span style={{ color: "#c9a227" }}>{topic.split(" ")[0]}</span>: {s.correct}/{s.total}
                      </span>
                    ))}
                  </div>
                  <button onClick={() => setScores({})} style={{ background: "none", border: "1px solid rgba(201,162,39,0.3)", color: "#c9a227", borderRadius: 6, padding: "4px 10px", cursor: "pointer", fontSize: 12 }}>Reset</button>
                </div>
              )}

              <div style={{ background: "rgba(255,255,255,0.05)", border: "1px solid rgba(255,255,255,0.1)", borderRadius: 16, padding: 24, marginBottom: 24 }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 18 }}>
                  <h2 style={{ color: "#fff", margin: 0, fontSize: 16 }}>Select Topics</h2>
                  <div style={{ display: "flex", gap: 8 }}>
                    <button onClick={selectAll} style={{ background: "rgba(201,162,39,0.2)", border: "1px solid rgba(201,162,39,0.4)", color: "#c9a227", borderRadius: 6, padding: "5px 12px", cursor: "pointer", fontSize: 12 }}>All</button>
                    <button onClick={clearAll} style={{ background: "rgba(255,255,255,0.05)", border: "1px solid rgba(255,255,255,0.15)", color: "#a89bda", borderRadius: 6, padding: "5px 12px", cursor: "pointer", fontSize: 12 }}>None</button>
                  </div>
                </div>
                <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(210px, 1fr))", gap: 10 }}>
                  {topics.map(topic => {
                    const sel = selectedTopics.includes(topic);
                    const c = TOPIC_COLORS[topic];
                    const count = ALL_QUESTIONS[topic].length;
                    const s = scores[topic];
                    return (
                      <button key={topic} onClick={() => toggleTopic(topic)} style={{ background: sel ? c.bg + "cc" : "rgba(255,255,255,0.04)", border: "1.5px solid " + (sel ? c.accent : "rgba(255,255,255,0.1)"), borderRadius: 10, padding: "12px 14px", cursor: "pointer", textAlign: "left", transition: "all 0.18s", transform: sel ? "scale(1.02)" : "scale(1)" }}>
                        <div style={{ color: sel ? "#fff" : "#b0a8cc", fontSize: 13, fontWeight: sel ? "bold" : "normal", lineHeight: 1.3 }}>{topic}</div>
                        <div style={{ display: "flex", justifyContent: "space-between", marginTop: 6 }}>
                          <span style={{ color: sel ? c.accent : "#665f88", fontSize: 11 }}>{count} questions</span>
                          {s && <span style={{ color: s.correct / s.total >= 0.8 ? "#5cdb5c" : s.correct / s.total >= 0.5 ? "#e0b84a" : "#e05c5c", fontSize: 11 }}>{s.correct}/{s.total}</span>}
                        </div>
                      </button>
                    );
                  })}
                </div>
              </div>

              <div style={{ textAlign: "center" }}>
                <div style={{ color: "#7a7099", fontSize: 13, marginBottom: 12 }}>
                  {selectedTopics.length === 0
                    ? "Select at least one topic to begin"
                    : selectedTopics.reduce((n, t) => n + ALL_QUESTIONS[t].length, 0) + " questions from " + selectedTopics.length + " topic" + (selectedTopics.length > 1 ? "s" : "")}
                </div>
                <button onClick={startQuiz} disabled={selectedTopics.length === 0} style={{ background: selectedTopics.length > 0 ? "linear-gradient(135deg, #c9a227 0%, #e8c547 100%)" : "rgba(255,255,255,0.1)", border: "none", color: selectedTopics.length > 0 ? "#1a1040" : "#665f88", borderRadius: 50, padding: "16px 52px", fontSize: 17, fontFamily: "Georgia, serif", fontWeight: "bold", cursor: selectedTopics.length > 0 ? "pointer" : "default", letterSpacing: 1, boxShadow: selectedTopics.length > 0 ? "0 4px 24px rgba(201,162,39,0.35)" : "none" }}>
                  Start Quiz →
                </button>
              </div>
            </div>
          </div>
        );
      }

      // ---- QUIZ ----
      if (screen === "quiz") {
        const progress = (current / questions.length) * 100;
        return (
          <div style={{ minHeight: "100vh", background: "linear-gradient(160deg, " + col.bg + "44 0%, #0f0c29 40%, #302b63 100%)", fontFamily: "Georgia, serif", display: "flex", flexDirection: "column", alignItems: "center", padding: "24px 16px 40px" }}>
            <div style={{ width: "100%", maxWidth: 700 }}>

              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
                <button onClick={() => setScreen("menu")} style={{ background: "none", border: "1px solid rgba(255,255,255,0.2)", color: "#a89bda", borderRadius: 8, padding: "6px 14px", cursor: "pointer", fontSize: 13 }}>← Menu</button>
                <span style={{ color: "#a89bda", fontSize: 14 }}>{current + 1} / {questions.length}</span>
                <span style={{ fontSize: 14 }}>
                  <span style={{ color: "#5cdb5c" }}>✓ {sessionResults.filter(r => r.correct).length}</span>
                  <span style={{ color: "#e05c5c", marginLeft: 10 }}>✗ {sessionResults.filter(r => !r.correct).length}</span>
                </span>
              </div>

              <div style={{ background: "rgba(255,255,255,0.08)", borderRadius: 99, height: 5, marginBottom: 24 }}>
                <div style={{ background: "linear-gradient(90deg, " + col.accent + ", #c9a227)", height: "100%", borderRadius: 99, width: progress + "%", transition: "width 0.4s ease" }} />
              </div>

              <div key={animKey} style={{ animation: "fadeSlideIn 0.35s ease forwards" }}>
                <div style={{ textAlign: "center", marginBottom: 16 }}>
                  <span style={{ background: col.bg + "cc", border: "1px solid " + col.accent + "66", color: col.accent, borderRadius: 99, padding: "5px 16px", fontSize: 11, letterSpacing: 2, textTransform: "uppercase" }}>
                    {currentQ.topic}
                  </span>
                </div>

                {/* Question */}
                <div style={{ background: "rgba(255,255,255,0.06)", border: "1.5px solid " + col.accent + "44", borderRadius: 20, padding: "30px 28px", marginBottom: 20, textAlign: "center" }}>
                  <p style={{ color: "#fff", fontSize: "clamp(16px, 2.8vw, 21px)", lineHeight: 1.55, margin: 0 }}>{currentQ.q}</p>
                </div>

                {/* Choices */}
                <div style={{ display: "flex", flexDirection: "column", gap: 10, marginBottom: 20 }}>
                  {currentQ.choices.map((choice, idx) => {
                    const isSelected = selected === idx;
                    const isRight = idx === currentQ.correctIndex;
                    let btnClass = "choice-btn";
                    let labelBg = "rgba(255,255,255,0.1)";
                    let labelColor = "#a89bda";

                    if (selected !== null) {
                      if (isRight) { btnClass += " correct"; labelBg = "#5cdb5c"; labelColor = "#000"; }
                      else if (isSelected && !isRight) { btnClass += " wrong"; labelBg = "#e05c5c"; labelColor = "#fff"; }
                      else { btnClass += " dimmed"; }
                    }

                    return (
                      <button key={idx} className={btnClass} onClick={() => handleSelect(idx)} disabled={selected !== null}>
                        <span className="label-badge" style={{ background: labelBg, color: labelColor }}>
                          {CHOICE_LABELS[idx]}
                        </span>
                        <span>{choice}</span>
                      </button>
                    );
                  })}
                </div>

                {/* Feedback + Next */}
                {selected !== null && (
                  <div style={{ animation: "fadeSlideIn 0.3s ease forwards" }}>
                    <div style={{ background: isCorrect ? "rgba(92,219,92,0.1)" : "rgba(224,92,92,0.1)", border: "1px solid " + (isCorrect ? "rgba(92,219,92,0.3)" : "rgba(224,92,92,0.3)"), borderRadius: 12, padding: "14px 18px", marginBottom: 16, display: "flex", alignItems: "center", gap: 10 }}>
                      <span style={{ fontSize: 20 }}>{isCorrect ? "✅" : "❌"}</span>
                      <span style={{ color: isCorrect ? "#5cdb5c" : "#e05c5c", fontSize: 14, fontWeight: "bold" }}>
                        {isCorrect ? "Correct!" : "Not quite — the correct answer is highlighted above."}
                      </span>
                    </div>
                    <div style={{ textAlign: "center" }}>
                      <button onClick={nextQuestion} style={{ background: "linear-gradient(135deg, #c9a227, #e8c547)", border: "none", color: "#1a1040", borderRadius: 50, padding: "14px 44px", fontSize: 16, fontFamily: "Georgia, serif", fontWeight: "bold", cursor: "pointer", boxShadow: "0 4px 20px rgba(201,162,39,0.3)" }}>
                        {current + 1 >= questions.length ? "See Results →" : "Next Question →"}
                      </button>
                    </div>
                  </div>
                )}
              </div>
            </div>
          </div>
        );
      }

      // ---- RESULTS ----
      if (screen === "results") {
        const pct = Math.round((totalCorrect / sessionResults.length) * 100);
        const grade = pct >= 90 ? { label: "Excellent!", color: "#5cdb5c", emoji: "🏆" }
          : pct >= 75 ? { label: "Good work!", color: "#c9a227", emoji: "⭐" }
          : pct >= 60 ? { label: "Keep studying!", color: "#e09a5c", emoji: "📚" }
          : { label: "More review needed", color: "#e05c5c", emoji: "💪" };

        const missed = sessionResults.filter(r => !r.correct);
        const missedByTopic = missed.reduce((acc, r) => {
          acc[r.topic] = acc[r.topic] || [];
          acc[r.topic].push(r);
          return acc;
        }, {});

        return (
          <div style={{ minHeight: "100vh", background: "linear-gradient(135deg, #0f0c29 0%, #302b63 60%, #24243e 100%)", fontFamily: "Georgia, serif", display: "flex", flexDirection: "column", alignItems: "center", padding: "40px 16px 60px" }}>
            <div style={{ width: "100%", maxWidth: 680 }}>

              <div style={{ textAlign: "center", marginBottom: 36 }}>
                <div style={{ fontSize: 52, marginBottom: 12 }}>{grade.emoji}</div>
                <div style={{ fontSize: 64, fontWeight: "bold", color: grade.color, lineHeight: 1 }}>{pct}%</div>
                <div style={{ color: "#fff", fontSize: 22, margin: "8px 0 4px" }}>{grade.label}</div>
                <div style={{ color: "#a89bda", fontSize: 15 }}>{totalCorrect} correct out of {sessionResults.length} questions</div>
              </div>

              <div style={{ background: "rgba(255,255,255,0.05)", border: "1px solid rgba(255,255,255,0.1)", borderRadius: 16, padding: 24, marginBottom: 24 }}>
                <h3 style={{ color: "#fff", margin: "0 0 16px", fontSize: 15 }}>Results by Topic</h3>
                {selectedTopics.map(topic => {
                  const s = sessionResults.filter(r => r.topic === topic);
                  if (s.length === 0) return null;
                  const correct = s.filter(r => r.correct).length;
                  const p = Math.round((correct / s.length) * 100);
                  return (
                    <div key={topic} style={{ marginBottom: 12 }}>
                      <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 4 }}>
                        <span style={{ color: "#c8c0e8", fontSize: 13 }}>{topic}</span>
                        <span style={{ color: p >= 80 ? "#5cdb5c" : p >= 60 ? "#c9a227" : "#e05c5c", fontSize: 13 }}>{correct}/{s.length} ({p}%)</span>
                      </div>
                      <div style={{ background: "rgba(255,255,255,0.07)", borderRadius: 99, height: 6 }}>
                        <div style={{ background: p >= 80 ? "#5cdb5c" : p >= 60 ? "#c9a227" : "#e05c5c", height: "100%", borderRadius: 99, width: p + "%", transition: "width 0.6s ease" }} />
                      </div>
                    </div>
                  );
                })}
              </div>

              {missed.length > 0 && (
                <div style={{ background: "rgba(224,92,92,0.07)", border: "1px solid rgba(224,92,92,0.2)", borderRadius: 16, padding: 24, marginBottom: 28 }}>
                  <h3 style={{ color: "#e05c5c", margin: "0 0 16px", fontSize: 15 }}>Review These ({missed.length})</h3>
                  {Object.entries(missedByTopic).map(([topic, qs]) => (
                    <div key={topic} style={{ marginBottom: 20 }}>
                      <div style={{ color: TOPIC_COLORS[topic].accent, fontSize: 11, letterSpacing: 2, textTransform: "uppercase", marginBottom: 8 }}>{topic}</div>
                      {qs.map((q, i) => (
                        <div key={i} style={{ background: "rgba(255,255,255,0.04)", borderRadius: 10, padding: "12px 14px", marginBottom: 8 }}>
                          <div style={{ color: "#e8e0ff", fontSize: 13, fontWeight: "bold", marginBottom: 6 }}>Q: {q.q}</div>
                          <div style={{ color: "#e05c5c", fontSize: 12, marginBottom: 4 }}>You chose: {q.choices[q.selectedIdx]}</div>
                          <div style={{ color: "#5cdb5c", fontSize: 12 }}>Correct: {q.a}</div>
                        </div>
                      ))}
                    </div>
                  ))}
                </div>
              )}

              <div style={{ display: "flex", gap: 12, justifyContent: "center", flexWrap: "wrap" }}>
                <button onClick={startQuiz} style={{ background: "linear-gradient(135deg, #c9a227, #e8c547)", border: "none", color: "#1a1040", borderRadius: 50, padding: "14px 32px", cursor: "pointer", fontSize: 15, fontFamily: "Georgia, serif", fontWeight: "bold" }}>↺ Retry Same Topics</button>
                <button onClick={() => setScreen("menu")} style={{ background: "rgba(255,255,255,0.08)", border: "1px solid rgba(255,255,255,0.2)", color: "#c8c0e8", borderRadius: 50, padding: "14px 32px", cursor: "pointer", fontSize: 15, fontFamily: "Georgia, serif" }}>← Choose Topics</button>
              </div>
            </div>
          </div>
        );
      }

      return null;
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<HistoryQuiz />);
  </script>
</body>
</html>
